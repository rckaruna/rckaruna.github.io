<style>

  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--mono);}
  .widget{max-width:780px;margin:0 auto;padding:1rem 1.1rem 1.3rem;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.6rem;}
  .picker{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;}
  .picker.hidden{display:none;}
  .picker label{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--sodium);white-space:nowrap;}
  select{font-family:var(--mono);font-size:.88rem;color:var(--ink);background:#fff;
         border:1px solid var(--hairline);border-radius:3px;padding:.45rem .6rem;flex:1;min-width:0;}
  .live-badge{display:none;align-items:center;gap:.45rem;font-family:var(--mono);font-size:.76rem;
              font-weight:600;color:var(--pitch-dk);letter-spacing:.06em;}
  .live-badge.on{display:inline-flex;}
  .dot{width:.6rem;height:.6rem;border-radius:50%;background:var(--pitch);
       box-shadow:0 0 0 0 rgba(22,115,79,.5);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(22,115,79,.5)}70%{box-shadow:0 0 0 8px rgba(22,115,79,0)}100%{box-shadow:0 0 0 0 rgba(22,115,79,0)}}
  @media (prefers-reduced-motion:reduce){.dot{animation:none}}
  .head{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:.4rem;}
  .title{font-family:var(--disp);font-weight:800;font-size:1.15rem;letter-spacing:-.01em;margin:0;line-height:1.15;}
  .result{font-size:.8rem;color:var(--muted);}
  .chartcard{border:1px solid var(--hairline);border-radius:4px;background:var(--paper);margin-top:.55rem;}
  #worm{display:block;width:100%;height:auto;}
  .controls{margin-top:.55rem;}
  .controls.hidden{display:none;}
  button{font-family:var(--mono);font-size:.82rem;font-weight:600;padding:.4rem .85rem;border-radius:3px;
         border:1.5px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;}
  button:hover{background:var(--ink);color:var(--paper);}
  .legend{display:flex;flex-wrap:wrap;gap:1rem;font-size:.74rem;color:var(--muted);margin-top:.5rem;}
  .sw{display:inline-block;width:.8rem;height:.8rem;border-radius:2px;margin-right:.35rem;vertical-align:-1px;}
  .src{font-size:.7rem;color:var(--muted);margin-top:.55rem;}
  .src code{background:#E9ECE6;padding:.05rem .3rem;border-radius:2px;}
</style>
</head>

  const leader = lastY>=0.5 ? m.team_a : m.team_b;
  const pct = Math.round(100*Math.max(lastY,1-lastY));
  const readY = py(lastY) + (lastY>=0.5 ? -10 : 16);
  $("worm").innerHTML = `
    <line x1="${X0}" y1="${YT}" x2="${X1}" y2="${YT}" stroke="#D6DAD2" stroke-width="1"/>
    <line x1="${X0}" y1="${py(0.5)}" x2="${X1}" y2="${py(0.5)}" stroke="#5E6B65" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="${X0}" y1="${YB}" x2="${X1}" y2="${YB}" stroke="#D6DAD2" stroke-width="1"/>
    <line x1="${px(20)}" y1="${YT}" x2="${px(20)}" y2="${YB}" stroke="#5E6B65" stroke-width="1" stroke-dasharray="2 4"/>
    <path d="${greenArea}" fill="rgba(22,115,79,0.16)"/>
    <path d="${amberArea}" fill="rgba(217,131,36,0.15)"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="#16734F" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    ${wkDots}
    <circle cx="${xLp}" cy="${f(py(lastY))}" r="5.5" fill="#16734F"/>
    ${hovers}
    <text x="${X0-8}" y="${YT+4}" text-anchor="end" font-family="IBM Plex Mono" font-size="13" fill="#5E6B65">100%</text>
    <text x="${X0-8}" y="${py(0.5)+4}" text-anchor="end" font-family="IBM Plex Mono" font-size="13" fill="#5E6B65">50</text>
    <text x="${X0-8}" y="${YB+4}" text-anchor="end" font-family="IBM Plex Mono" font-size="13" fill="#5E6B65">0</text>
    <text x="${X0+6}" y="${py(0.5)-6}" font-family="IBM Plex Mono" font-size="11" fill="#5E6B65">EVEN</text>
    <text x="${px(0)}" y="${YB+22}" text-anchor="middle" font-family="IBM Plex Mono" font-size="12" fill="#5E6B65">0</text>
    <text x="${px(10)}" y="${YB+22}" text-anchor="middle" font-family="IBM Plex Mono" font-size="12" fill="#5E6B65">10</text>
    <text x="${px(20)}" y="${YB+22}" text-anchor="middle" font-family="IBM Plex Mono" font-size="12" fill="#5E6B65">20</text>
    <text x="${px(30)}" y="${YB+22}" text-anchor="middle" font-family="IBM Plex Mono" font-size="12" fill="#5E6B65">10</text>
    <text x="${px(40)}" y="${YB+22}" text-anchor="middle" font-family="IBM Plex Mono" font-size="12" fill="#5E6B65">20</text>
    <text x="${px(10)}" y="${YT-10}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#5E6B65">1ST INNINGS</text>
    <text x="${px(30)}" y="${YT-10}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#5E6B65">CHASE</text>
    <text x="${xLp-8}" y="${f(readY)}" text-anchor="end" font-family="IBM Plex Mono" font-weight="700" font-size="14" fill="#16734F">${esc(leader.toUpperCase())} ${pct}%</text>`;
}

let lastUpdatedISO = null, isLive = false;
function agoText(iso){ const s=Math.max(0,Math.round((Date.now()-Date.parse(iso))/1000)); return s<60?s+"s ago":Math.round(s/60)+"m ago"; }
function setHead(m, live, statusLabel, updatedISO){
  $("mtitle").textContent = m.label;
  if (live){
    $("badge").classList.add("on");
    lastUpdatedISO = updatedISO; isLive = true;
    $("badgeText").textContent = "LIVE · " + statusLabel + (updatedISO ? " · updated " + agoText(updatedISO) : "");
    $("mresult").textContent = "";
  } else {
    $("badge").classList.remove("on"); isLive = false;
    $("mresult").textContent = m.result || "";
  }
}
setInterval(()=>{ if(isLive && lastUpdatedISO){ const t=$("badgeText").textContent.split(" · "); if(t.length>=2){ t[t.length-1]="updated "+agoText(lastUpdatedISO); $("badgeText").textContent=t.join(" · "); } } }, 1000);

// ---- quiet mode (dropdown over presets) ----
function showQuiet(){ $("pickerWrap").classList.remove("hidden"); }
function hideQuiet(){ $("pickerWrap").classList.add("hidden"); }
function renderSelected(){ const m=PRESETS.matches[+$("match").value]; render(m); setHead(m,false); }

// ---- live mode (poll the gist) ----
async function poll(){
  try{
    const url = CONFIG.LIVE_URL + (CONFIG.LIVE_URL.includes("?")?"&":"?") + "t=" + Date.now();
    const r = await fetch(url, {cache:"no-store"});
    if (r.ok){
      const d = await r.json();
      const fresh = d && d.live===true && (Date.now()-Date.parse(d.updated)) < CONFIG.STALE_MS;
      if (fresh){ hideQuiet(); render(d); setHead(d, true, d.status||"in progress", d.updated); return; }
    }
  }catch(e){ /* network blip — fall through to quiet */ }
  showQuiet(); renderSelected();
}

// ---- demo simulate (preview only; hidden once LIVE_URL is set) ----
let simTimer=null;
function simulate(){
  const m = PRESETS.matches.find(x=>x.id==="IND_PAK_FEB_15") || PRESETS.matches.find(x=>x.chase_over.length>6) || PRESETS.matches[0];
  hideQuiet(); $("simBtn").textContent="■ Stop"; $("simBtn").onclick=stopSim;
  let k=0; const lastK=m.chase_over.length-1;
  clearInterval(simTimer);
  simTimer=setInterval(()=>{
    const co=m.chase_over[k], live=k<lastK;
    const wko=[], wkw=[];
    m.wk_chase_over.forEach((o,i)=>{ if(o<=co){ wko.push(o); wkw.push(m.wk_chase_wp[i]); }});
    const part = Object.assign({}, m, {
      chase_over:m.chase_over.slice(0,k+1), chase_wp:m.chase_wp.slice(0,k+1),
      wk_chase_over:wko, wk_chase_wp:wkw,
      status: live?"chase":"complete", live:live, result: live?"":m.result
    });
    render(part);
    setHead(part, live, "chase · over "+co, new Date().toISOString());
    if(!live){ clearInterval(simTimer); $("badge").classList.remove("on"); $("mresult").textContent=m.result||""; }
    k++;
  }, 650);
}
function stopSim(){ clearInterval(simTimer); $("simBtn").textContent="▶ Simulate a live match"; $("simBtn").onclick=simulate; showQuiet(); renderSelected(); }

// ---- init ----
(function init(){
  const sel=$("match");
  PRESETS.matches.forEach((m,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=m.label; sel.appendChild(o); });
  sel.addEventListener("change", ()=>{ if(!isLive) renderSelected(); });
  renderSelected();

  if (CONFIG.LIVE_URL){
    $("controls").classList.add("hidden");      // no simulate button in production
    $("srcNote").innerHTML = 'Live mode: polling <code>live.json</code> every '+(CONFIG.POLL_MS/1000)+'s; falls back to preset matches between games.';
    poll(); setInterval(poll, CONFIG.POLL_MS);
  } else {
    $("simBtn").onclick = simulate;
    $("srcNote").innerHTML = 'Preview: trajectories from the model, presets embedded. Set <code>CONFIG.LIVE_URL</code> to your gist to enable live polling; the simulate button replays a real chase to show how live looks.';
  }
})();
</script>
