project:
  type: website
  output-dir: docs          # GitHub Pages can serve from /docs on main

resources:
  - widgets/worm.html
  - CNAME

website:
  title: "Ruwan C. Karunanayaka"
  description: "Statistical consulting, experimental design, and interactive data tools — Ruwan C. Karunanayaka, PhD."
  site-url: "https://rckaruna.ca"
  open-graph: true
  twitter-card: true

  navbar:
    pinned: true
    logo: ""
    title: "Ruwan C. Karunanayaka"
    left:
      - text: "Consulting"
        href: consulting.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "Research"
        href: research.qmd
      - text: "Teaching"
        href: teaching.qmd
      - text: "Blog"
        href: blog.qmd
    right:
      - icon: github
        href: https://github.com/rckaruna
        aria-label: GitHub
      - text: "ORCID"
        href: https://orcid.org/0009-0008-2459-1569

  page-footer:
    left: "© 2026 Ruwan C. Karunanayaka · Associate Professor, University of the Fraser Valley"
    right:
      - text: "ruwan.karunanayaka@ufv.ca"
        href: "mailto:ruwan.karunanayaka@ufv.ca"
      - text: "GitHub"
        href: https://github.com/rckaruna
      - text: "ORCID"
        href: https://orcid.org/0009-0008-2459-1569

format:
  html:
    theme: theme.scss
    toc: false
    grid:
      body-width: 980px
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true
    smooth-scroll: true
    include-in-header:
      text: |
        <script>
        window.addEventListener("DOMContentLoaded", function () {
          document.querySelectorAll("a[href^='http']").forEach(function (a) {
            if (a.hostname && a.hostname !== window.location.hostname) {
              a.setAttribute("target", "_blank");
              a.setAttribute("rel", "noopener");
            }
          });
          // Conversion events: contact intent
          function track(name) {
            if (window.goatcounter && window.goatcounter.count) {
              window.goatcounter.count({ path: name, title: name, event: true });
            }
          }
          document.querySelectorAll("a[href^='mailto:']").forEach(function (a) {
            a.addEventListener("click", function () { track("contact-email-click"); });
          });
          var c = document.getElementById("copyEmail");
          if (c) { c.addEventListener("click", function () { track("contact-copy-address"); }); }
          document.querySelectorAll("a[href*='shinyapps.io']").forEach(function (a) {
            a.addEventListener("click", function () { track("open-forecaster-app"); });
          });
        });
        </script>
        <script data-goatcounter="https://rckaruna.goatcounter.com/count"
                async src="//gc.zgo.at/count.js"></script>
        <script type="application/ld+json">
        {
          "@context": "https://schema.org",
          "@graph": [
            {
              "@type": "Person",
              "@id": "https://rckaruna.ca/#person",
              "name": "Ruwan C. Karunanayaka",
              "jobTitle": "Associate Professor of Statistics; Statistical Consultant",
              "worksFor": {
                "@type": "CollegeOrUniversity",
                "name": "University of the Fraser Valley"
              },
              "alumniOf": [
                { "@type": "CollegeOrUniversity", "name": "Simon Fraser University" },
                { "@type": "CollegeOrUniversity", "name": "Sam Houston State University" },
                { "@type": "CollegeOrUniversity", "name": "University of Kelaniya" }
              ],
              "url": "https://rckaruna.ca",
              "image": "https://rckaruna.ca/assets/ruwan.jpg",
              "email": "mailto:ruwan.karunanayaka@ufv.ca",
              "sameAs": [
                "https://orcid.org/0009-0008-2459-1569",
                "https://github.com/rckaruna"
              ],
              "knowsAbout": [
                "statistical consulting",
                "design of experiments",
                "generalizability theory",
                "measurement reliability",
                "sample size and power analysis",
                "AI evaluation",
                "sports analytics",
                "R programming"
              ]
            },
            {
              "@type": "ProfessionalService",
              "@id": "https://rckaruna.ca/#service",
              "name": "Ruwan C. Karunanayaka, Statistical Consulting",
              "founder": { "@id": "https://rckaruna.ca/#person" },
              "url": "https://rckaruna.ca/consulting.html",
              "description": "Statistical consulting: experimental design, sample size and power, mixed models, measurement reliability, AI and machine-learning evaluation audits, and interactive dashboards.",
              "areaServed": [
                { "@type": "AdministrativeArea", "name": "British Columbia" },
                { "@type": "Country", "name": "Canada" },
                { "@type": "Place", "name": "Remote / Worldwide" }
              ],
              "priceRange": "$$"
            }
          ]
        }
        </script>

execute:
  freeze: auto        # cache computed chunks so the site builds fast on CI
  echo: false
  warning: false
  message: false
